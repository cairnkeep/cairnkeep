name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  memory-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-memory-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-memory-server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/test-bootstrap-untracked.sh
