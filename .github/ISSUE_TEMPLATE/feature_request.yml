name: Feature request
description: Propose a provider-neutral improvement
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should Cairnkeep solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful, provider-neutral solution.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and data impact
      description: Note storage, protocol, security, migration, or client compatibility implications.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: This proposal contains no credentials, private endpoints, or proprietary data.
          required: true
        - label: I searched existing issues and discussions.
          required: true
